name: Check for New NVIDIA Drivers

on:
  schedule:
    - cron: '0 8 * * 3'  # Every Wednesday at 08:00 UTC
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for newer NVIDIA 580.x driver
        id: check_driver
        run: |
          KNOWN_VERSION=$(cat .nvidia-driver-version | tr -d '[:space:]')
          echo "Current tracked version: ${KNOWN_VERSION}"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$KNOWN_VERSION"

          FOUND_NEWER=""

          # Probe NVIDIA download server for newer versions in the same branch
          # Check incremented patch versions
          for NEW_PATCH in $(seq $((PATCH + 1)) $((PATCH + 30))); do
            CANDIDATE="${MAJOR}.${MINOR}.$(printf '%02d' ${NEW_PATCH})"
            HTTP_CODE=$(curl -sI -o /dev/null -w "%{http_code}" \
              "https://us.download.nvidia.com/XFree86/Linux-x86_64/${CANDIDATE}/NVIDIA-Linux-x86_64-${CANDIDATE}-no-compat32.run" \
              --connect-timeout 5 --max-time 10 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "301" ] || [ "$HTTP_CODE" = "302" ]; then
              echo "Found: ${CANDIDATE} (HTTP ${HTTP_CODE})"
              FOUND_NEWER="$CANDIDATE"
            fi
          done

          # Check next minor version bump
          for NEW_MINOR in $(seq $((MINOR + 1)) $((MINOR + 3))); do
            for NEW_PATCH in $(seq 0 30); do
              CANDIDATE="${MAJOR}.${NEW_MINOR}.$(printf '%02d' ${NEW_PATCH})"
              HTTP_CODE=$(curl -sI -o /dev/null -w "%{http_code}" \
                "https://us.download.nvidia.com/XFree86/Linux-x86_64/${CANDIDATE}/NVIDIA-Linux-x86_64-${CANDIDATE}-no-compat32.run" \
                --connect-timeout 5 --max-time 10 2>/dev/null || echo "000")
              if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "301" ] || [ "$HTTP_CODE" = "302" ]; then
                echo "Found: ${CANDIDATE} (HTTP ${HTTP_CODE})"
                FOUND_NEWER="$CANDIDATE"
              fi
            done
          done

          if [ -n "$FOUND_NEWER" ]; then
            echo "Newest driver found: ${FOUND_NEWER}"
            echo "new_driver=true" >> "$GITHUB_OUTPUT"
            echo "new_version=${FOUND_NEWER}" >> "$GITHUB_OUTPUT"
          else
            echo "No newer 580.x driver found"
            echo "new_driver=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if issue already exists
        if: steps.check_driver.outputs.new_driver == 'true'
        id: existing_issue
        uses: actions/github-script@v7
        with:
          script: |
            const newVersion = '${{ steps.check_driver.outputs.new_version }}';
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              labels: 'nvidia-driver-update',
              per_page: 100
            });
            const exists = issues.data.some(i => i.title.includes(newVersion));
            core.setOutput('exists', exists.toString());

      - name: Create issue for new NVIDIA driver
        if: steps.check_driver.outputs.new_driver == 'true' && steps.existing_issue.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const newVersion = '${{ steps.check_driver.outputs.new_version }}';
            const driverUrl = `https://us.download.nvidia.com/XFree86/Linux-x86_64/${newVersion}/NVIDIA-Linux-x86_64-${newVersion}-no-compat32.run`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `New NVIDIA driver available: ${newVersion}`,
              body: `A newer NVIDIA 580.x driver has been detected: **${newVersion}**\n\n` +
                `Driver URL: ${driverUrl}\n\n` +
                `To build with this driver, manually trigger the **Build NVIDIA Sysext** workflow with:\n` +
                `- \`nvidia_driver_version\`: \`${newVersion}\`\n\n` +
                `After verifying the build, update \`.nvidia-driver-version\` to track this as the new default.`,
              labels: ['nvidia-driver-update']
            });
