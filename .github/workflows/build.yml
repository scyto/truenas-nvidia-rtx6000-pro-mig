name: Build NVIDIA Sysext

on:
  workflow_dispatch:
    inputs:
      truenas_version:
        description: 'TrueNAS version (e.g., 25.10.2.1)'
        required: true
        default: '25.10.2.1'
      nvidia_driver_version:
        description: 'NVIDIA driver version (e.g., 580.126.18)'
        required: true
        default: '580.126.18'
      train_name:
        description: 'Train name (e.g., Goldeye)'
        required: true
        default: 'Goldeye'
      display_mode_selector_url:
        description: 'Optional: URL to DisplayModeSelector package from developer.nvidia.com/displaymodeselector (leave empty to skip)'
        required: false
        default: ''

  workflow_call:
    inputs:
      truenas_version:
        type: string
        required: true
      nvidia_driver_version:
        type: string
        required: true
      train_name:
        type: string
        required: true
      display_mode_selector_url:
        type: string
        required: false
        default: ''

permissions:
  contents: write

jobs:
  # ─── Job 1: Build all TrueNAS packages (~5-6h first run, incremental on cache) ─
  build-packages:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Free disk space
        run: |
          echo "Before cleanup:"
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache \
            /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup \
            /opt/az /opt/microsoft /usr/lib/jvm &
          sudo apt-get purge -y google-cloud-cli azure-cli microsoft-edge-stable 2>/dev/null &
          sudo docker image prune -af &>/dev/null &
          wait
          sudo apt-get autoremove -y || true
          sudo apt-get clean
          echo "After cleanup:"
          df -h /

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Update submodule to target release branch
        run: |
          cd scale-build
          git fetch origin "release/${{ inputs.truenas_version }}"
          git checkout FETCH_HEAD
          echo "Checked out scale-build at release/${{ inputs.truenas_version }}"
          git log --oneline -1

      - name: Restore APT cache
        uses: actions/cache@v4
        with:
          path: ~/apt-cache
          key: apt-deps-${{ runner.os }}-v3

      - name: Install build dependencies
        run: |
          if [ -d ~/apt-cache ]; then
            sudo cp ~/apt-cache/*.deb /var/cache/apt/archives/ 2>/dev/null || true
          fi
          sudo apt-get update
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt-get install -y \
            build-essential \
            debootstrap \
            git \
            python3.11 \
            python3.11-venv \
            python3.11-dev \
            squashfs-tools \
            unzip \
            libjson-perl \
            rsync \
            libarchive-tools \
            zstd \
            ccache
          sudo update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.11 1
          python3 --version
          mkdir -p ~/apt-cache
          cp /var/cache/apt/archives/*.deb ~/apt-cache/ 2>/dev/null || true

      - name: Verify NVIDIA driver URL is accessible
        run: |
          DRIVER_URL="https://us.download.nvidia.com/XFree86/Linux-x86_64/${{ inputs.nvidia_driver_version }}/NVIDIA-Linux-x86_64-${{ inputs.nvidia_driver_version }}-no-compat32.run"
          echo "Checking: ${DRIVER_URL}"
          HTTP_CODE=$(curl -sI -o /dev/null -w "%{http_code}" "$DRIVER_URL")
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "301" ] && [ "$HTTP_CODE" != "302" ]; then
            echo "ERROR: NVIDIA driver URL returned HTTP ${HTTP_CODE}"
            echo "URL: ${DRIVER_URL}"
            exit 1
          fi
          echo "Driver URL verified (HTTP ${HTTP_CODE})"

      # ── Granular caches: restore previous build state so scale-build can skip unchanged packages ──
      # Uses restore/save split so saves run even on timeout/failure (if: always())

      # Cache 1: Bootstrap chroot (avoids re-running debootstrap, ~15 min saved)
      - name: Restore bootstrap cache
        uses: actions/cache/restore@v4
        with:
          path: scale-build/tmp/cache
          key: bootstrap-${{ inputs.truenas_version }}-${{ github.run_id }}
          restore-keys: |
            bootstrap-${{ inputs.truenas_version }}-

      # Cache 2: Built packages + hashes (the big one — enables incremental builds)
      # Rolling key: each run saves a new entry. Restore-keys pick up the latest.
      # If we build 80/126 packages before timeout, next run resumes from 80.
      - name: Restore packages cache
        uses: actions/cache/restore@v4
        with:
          path: |
            scale-build/tmp/pkgdir
            scale-build/tmp/pkghashes
          key: pkgs-${{ inputs.truenas_version }}-${{ github.run_id }}
          restore-keys: |
            pkgs-${{ inputs.truenas_version }}-

      # Cache 3: Compiler cache (saves ~2-3h on kernel rebuilds when warm)
      - name: Restore ccache
        uses: actions/cache/restore@v4
        with:
          path: scale-build/tmp/ccache
          key: ccache-${{ inputs.truenas_version }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ inputs.truenas_version }}-

      - name: Patch scale-build for GitHub runner compatibility
        run: |
          # setuptools ≥72 removed 'setup.py install' support.
          sed -i 's/python3 setup.py install/pip install ./' scale-build/Makefile

          # Shallow clone: scale-build only needs HEAD for building (rev-parse HEAD
          # for hash, copytree into chroot for build). Full history wastes ~7 min on
          # the kernel repo alone.
          sed -i "s|\['clone', '--recurse', self.origin, self.source_path\]|['clone', '--depth', '1', '--recurse-submodules', '--shallow-submodules', self.origin, '-b', branch, self.source_path]|" \
            scale-build/scale_build/packages/git.py

      - name: Checkout scale-build sources
        run: |
          cd scale-build
          make checkout

      - name: Patch NVIDIA driver version
        run: |
          chmod +x scripts/patch-driver-version.sh
          ./scripts/patch-driver-version.sh scale-build "${{ inputs.nvidia_driver_version }}"

      - name: Strip debug packages from manifest
        run: |
          chmod +x scripts/strip-debug-packages.sh
          ./scripts/strip-debug-packages.sh scale-build

      - name: Create dummy packages for failed builds
        run: |
          mkdir -p scale-build/tmp/pkgdir
          chmod +x scripts/create-dummy-packages.sh
          ./scripts/create-dummy-packages.sh scale-build

      - name: Build packages
        id: build-packages
        timeout-minutes: 330  # 5.5h step timeout; leaves 30 min for cache saves before 6h job timeout
        continue-on-error: true  # Let job continue to save caches even if this step times out
        run: |
          cd scale-build
          sudo -E make packages
        env:
          CCACHE: 1

      - name: Upload build logs on failure
        if: failure() || steps.build-packages.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: scale-build/logs/
          retention-days: 3

      # ── Save caches (if: always() ensures these run even on timeout/failure) ──

      - name: Fix cache directory permissions
        if: always()
        run: |
          # make packages runs as sudo, so files are root-owned.
          # GitHub Actions cache needs read access.
          sudo chown -R runner:runner scale-build/tmp/cache scale-build/tmp/pkgdir scale-build/tmp/pkghashes scale-build/tmp/ccache 2>/dev/null || true

      - name: Save bootstrap cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: scale-build/tmp/cache
          key: bootstrap-${{ inputs.truenas_version }}-${{ github.run_id }}

      - name: Save packages cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            scale-build/tmp/pkgdir
            scale-build/tmp/pkghashes
          key: pkgs-${{ inputs.truenas_version }}-${{ github.run_id }}

      - name: Save ccache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: scale-build/tmp/ccache
          key: ccache-${{ inputs.truenas_version }}-${{ github.run_id }}

      - name: Fail if packages build timed out
        if: steps.build-packages.outcome == 'failure'
        run: |
          echo "ERROR: make packages did not complete (likely timed out)."
          echo "Caches have been saved — next run will resume from where this one stopped."
          exit 1

      - name: Compress built packages for transfer to Job 2
        run: |
          cd scale-build
          echo "=== Package directory sizes ==="
          du -sh tmp/pkgdir/ tmp/cache/ 2>/dev/null || true
          sudo tar -cf - -C tmp pkgdir cache 2>/dev/null | zstd -T0 -3 -o /tmp/build-state.tar.zst
          echo "Compressed archive size:"
          ls -lh /tmp/build-state.tar.zst

      - name: Upload build state as artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-state-${{ inputs.truenas_version }}
          path: /tmp/build-state.tar.zst
          retention-days: 3
          compression-level: 0  # Already compressed with zstd

  # ─── Job 2: Build update image and extract nvidia.raw (~1-2h) ─────────────
  build-update:
    needs: build-packages
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Free disk space
        run: |
          echo "Before cleanup:"
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache \
            /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup \
            /opt/az /opt/microsoft /usr/lib/jvm &
          sudo apt-get purge -y google-cloud-cli azure-cli microsoft-edge-stable 2>/dev/null &
          sudo docker image prune -af &>/dev/null &
          wait
          sudo apt-get autoremove -y || true
          sudo apt-get clean
          echo "After cleanup:"
          df -h /

      - name: Add swap space for tmpfs backing
        run: |
          # The scale-build system mounts a 25GB tmpfs for the rootfs chroot.
          # It needs ~20GB+ during extension building (3 copies of rootfs).
          # GitHub runners have 7GB RAM + ~4GB swap = ~11GB, which is insufficient.
          # Replace existing swap with a larger one.
          echo "Current swap:"
          free -h | grep -i swap
          # Remove existing swapfile if present (runner default is 4GB)
          sudo swapoff /swapfile 2>/dev/null || true
          sudo rm -f /swapfile
          sudo fallocate -l 20G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          echo "After adding swap:"
          free -h | grep -i swap
          echo "Total memory + swap available for tmpfs:"
          awk '/MemTotal|SwapTotal/{printf "%s: %s\n", $1, $2}' /proc/meminfo

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Update submodule to target release branch
        run: |
          cd scale-build
          git fetch origin "release/${{ inputs.truenas_version }}"
          git checkout FETCH_HEAD
          echo "Checked out scale-build at release/${{ inputs.truenas_version }}"
          git log --oneline -1

      - name: Restore APT cache
        uses: actions/cache@v4
        with:
          path: ~/apt-cache
          key: apt-deps-${{ runner.os }}-v1

      - name: Install build dependencies
        run: |
          if [ -d ~/apt-cache ]; then
            sudo cp ~/apt-cache/*.deb /var/cache/apt/archives/ 2>/dev/null || true
          fi
          sudo apt-get update
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt-get install -y \
            build-essential \
            debootstrap \
            git \
            python3.11 \
            python3.11-venv \
            python3.11-dev \
            squashfs-tools \
            unzip \
            libjson-perl \
            rsync \
            libarchive-tools \
            zstd
          sudo update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.11 1
          python3 --version
          mkdir -p ~/apt-cache
          cp /var/cache/apt/archives/*.deb ~/apt-cache/ 2>/dev/null || true

      - name: Patch NVIDIA driver version
        run: |
          chmod +x scripts/patch-driver-version.sh
          ./scripts/patch-driver-version.sh scale-build "${{ inputs.nvidia_driver_version }}"

      - name: Strip debug packages from manifest
        run: |
          chmod +x scripts/strip-debug-packages.sh
          ./scripts/strip-debug-packages.sh scale-build

      - name: Download build state from Job 1
        uses: actions/download-artifact@v4
        with:
          name: build-state-${{ inputs.truenas_version }}
          path: /tmp

      - name: Restore built packages
        run: |
          cd scale-build
          mkdir -p tmp
          zstd -d /tmp/build-state.tar.zst --stdout | sudo tar xf - -C tmp/
          rm /tmp/build-state.tar.zst
          echo "Restored packages:"
          ls tmp/pkgdir/*.deb 2>/dev/null | wc -l
          echo ".deb files"
          echo "Cache contents:"
          ls -lh tmp/cache/ 2>/dev/null || echo "(no cache)"
          echo "Disk space:"
          df -h /

      - name: Patch Makefile for modern setuptools compatibility
        run: |
          sed -i 's/python3 setup.py install/pip install ./' scale-build/Makefile

      - name: Patch scale-build for GitHub runner compatibility
        run: |
          python3 -c "
          import pathlib

          # Fix: unsquashfs -dest creates the target dir itself and fails if it exists.
          p = pathlib.Path('scale-build/scale_build/extensions.py')
          lines = p.read_text().splitlines(keepends=True)
          out = [l for l in lines if 'os.makedirs(chroot' not in l and 'os.makedirs(self.chroot)' not in l]
          p.write_text(''.join(out))
          print(f'extensions.py: removed {len(lines) - len(out)} os.makedirs line(s)')
          "

      - name: Build update image
        run: |
          export TRUENAS_TRAIN="TrueNAS-SCALE-${{ inputs.train_name }}"
          export TRUENAS_VERSION="${{ inputs.truenas_version }}"
          echo "Build Train: ${TRUENAS_TRAIN}"
          echo "Build Version: ${TRUENAS_VERSION}"
          echo "Disk and memory before build:"
          df -h /
          free -h
          cd scale-build
          sudo -E make update

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: update-build-logs
          path: scale-build/logs/
          retention-days: 3

      - name: Extract nvidia.raw from rootfs
        run: |
          cd scale-build
          mkdir -p ./tmpfile/rootfs
          sudo mount ./tmp/update/rootfs.squashfs ./tmpfile/rootfs

          NVIDIA_RAW="./tmpfile/rootfs/usr/share/truenas/sysext-extensions/nvidia.raw"
          if [ ! -f "$NVIDIA_RAW" ]; then
            echo "ERROR: nvidia.raw not found in rootfs"
            ls -la ./tmpfile/rootfs/usr/share/truenas/sysext-extensions/ || true
            sudo umount ./tmpfile/rootfs
            exit 1
          fi

          cp "$NVIDIA_RAW" ../nvidia.raw
          sudo umount ./tmpfile/rootfs

          echo "Extracted nvidia.raw:"
          ls -lh ../nvidia.raw

      - name: Inject displaymodeselector into sysext (if provided)
        if: inputs.display_mode_selector_url != ''
        run: |
          echo "Downloading displaymodeselector..."
          curl -fSL "${{ inputs.display_mode_selector_url }}" -o /tmp/displaymodeselector_pkg

          mkdir -p /tmp/nvidia-sysext
          sudo unsquashfs -d /tmp/nvidia-sysext nvidia.raw

          FILE_TYPE=$(file /tmp/displaymodeselector_pkg)
          if echo "$FILE_TYPE" | grep -q "gzip"; then
            mkdir -p /tmp/dms_extract
            tar xzf /tmp/displaymodeselector_pkg -C /tmp/dms_extract
            DMS_BIN=$(find /tmp/dms_extract -iname "displaymodeselector" -type f | head -1)
            if [ -n "$DMS_BIN" ]; then
              sudo cp "$DMS_BIN" /tmp/nvidia-sysext/usr/bin/displaymodeselector
            fi
          elif echo "$FILE_TYPE" | grep -q "executable"; then
            chmod +x /tmp/displaymodeselector_pkg
            mkdir -p /tmp/dms_extract
            /tmp/displaymodeselector_pkg --extract /tmp/dms_extract 2>/dev/null \
              || sudo cp /tmp/displaymodeselector_pkg /tmp/nvidia-sysext/usr/bin/displaymodeselector
            if [ -d /tmp/dms_extract ]; then
              DMS_BIN=$(find /tmp/dms_extract -iname "displaymodeselector" -type f | head -1)
              if [ -n "$DMS_BIN" ]; then
                sudo cp "$DMS_BIN" /tmp/nvidia-sysext/usr/bin/displaymodeselector
              fi
            fi
          else
            echo "WARNING: Unknown package format, attempting direct copy"
            sudo cp /tmp/displaymodeselector_pkg /tmp/nvidia-sysext/usr/bin/displaymodeselector
          fi

          sudo chmod +x /tmp/nvidia-sysext/usr/bin/displaymodeselector 2>/dev/null || true

          sudo mksquashfs /tmp/nvidia-sysext nvidia.raw -noappend -comp zstd
          echo "Rebuilt nvidia.raw with displaymodeselector:"
          ls -lh nvidia.raw

      - name: Inject MIG setup service into sysext
        run: |
          echo "Injecting MIG setup service into nvidia.raw..."
          mkdir -p /tmp/nvidia-mig-inject
          sudo unsquashfs -d /tmp/nvidia-mig-inject nvidia.raw

          # Add MIG setup script
          sudo cp sysext/usr/bin/nvidia-mig-setup /tmp/nvidia-mig-inject/usr/bin/nvidia-mig-setup
          sudo chmod +x /tmp/nvidia-mig-inject/usr/bin/nvidia-mig-setup

          # Add systemd service
          sudo mkdir -p /tmp/nvidia-mig-inject/usr/lib/systemd/system
          sudo cp sysext/usr/lib/systemd/system/nvidia-mig-setup.service /tmp/nvidia-mig-inject/usr/lib/systemd/system/

          # Enable the service (create WantedBy symlink)
          sudo mkdir -p /tmp/nvidia-mig-inject/usr/lib/systemd/system/multi-user.target.wants
          sudo ln -sf ../nvidia-mig-setup.service /tmp/nvidia-mig-inject/usr/lib/systemd/system/multi-user.target.wants/nvidia-mig-setup.service

          sudo mksquashfs /tmp/nvidia-mig-inject nvidia.raw -noappend -comp zstd
          sudo rm -rf /tmp/nvidia-mig-inject
          echo "Rebuilt nvidia.raw with MIG setup service:"
          ls -lh nvidia.raw

      - name: List sysext contents
        run: |
          echo "=== nvidia.raw sysext contents (key binaries) ==="
          sudo unsquashfs -l nvidia.raw | grep -iE '(nvidia-smi|nvidia-persistenced|nvidia-fabric|displaymode|nvidia-cuda-mps|nvidia-mig|usr/bin/|usr/lib/x86_64|systemd/system)' | head -60
          echo "=== Full size ==="
          ls -lh nvidia.raw

      - name: Generate checksums
        run: |
          sha256sum nvidia.raw > nvidia.raw.sha256
          cat nvidia.raw.sha256

      - name: Collect artifacts
        run: |
          mkdir -p artifacts/extensions
          mv nvidia.raw artifacts/extensions/
          mv nvidia.raw.sha256 artifacts/extensions/
          cp scale-build/tmp/release/manifest.json artifacts/ 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nvidia-sysext-${{ inputs.truenas_version }}-driver-${{ inputs.nvidia_driver_version }}
          path: |
            artifacts/extensions/nvidia.raw
            artifacts/extensions/nvidia.raw.sha256
            artifacts/manifest.json

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.truenas_version }}-nvidia${{ inputs.nvidia_driver_version }}
          name: "TrueNAS ${{ inputs.truenas_version }} - NVIDIA ${{ inputs.nvidia_driver_version }}"
          body: |
            ## NVIDIA Sysext for TrueNAS SCALE ${{ inputs.truenas_version }} (${{ inputs.train_name }})

            **NVIDIA Driver:** ${{ inputs.nvidia_driver_version }}
            **Kernel Modules:** Open (required for Blackwell)
            **Target GPU:** RTX PRO 6000 Blackwell Workstation Edition (MIG-capable)

            ### Included Utilities
            - `nvidia-smi` — GPU management and monitoring
            - `nvidia-persistenced` — Persistent daemon for GPU state
            - `nvidia-cuda-mps-control` / `nvidia-cuda-mps-server` — Multi-Process Service
            - All standard NVIDIA driver userspace utilities

            ### MIG Support
            Supports Multi-Instance GPU on RTX PRO 6000 Blackwell:
            - Up to **4x 24GB** instances or **2x 48GB** instances
            - Workstation Edition: set display mode to **compute** before enabling MIG

            ### Install
            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/v${{ inputs.truenas_version }}-nvidia${{ inputs.nvidia_driver_version }}/install.sh | sudo bash
            ```

            ### Checksums
            See `nvidia.raw.sha256` for verification.
          files: |
            artifacts/extensions/nvidia.raw
            artifacts/extensions/nvidia.raw.sha256
            scripts/install.sh
            scripts/restore.sh
            scripts/nvidia-postinit.sh
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
