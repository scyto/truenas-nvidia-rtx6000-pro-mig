name: Check for New TrueNAS Releases

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for new TrueNAS 25.10.x releases
        id: check_release
        run: |
          # Fetch tags from scale-build repo
          TAGS_JSON=$(curl -sf "https://api.github.com/repos/truenas/scale-build/tags?per_page=100" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}")

          # Find the latest stable 25.10.x tag (exclude BETA/RC)
          LATEST_TAG=$(echo "$TAGS_JSON" | python3 -c "
          import sys, json
          tags = json.load(sys.stdin)
          goldeye = [
              t['name'] for t in tags
              if t['name'].startswith('TS-25.10.')
              and 'BETA' not in t['name'].upper()
              and 'RC' not in t['name'].upper()
          ]
          if not goldeye:
              print('')
              sys.exit()
          # Sort by version components
          goldeye.sort(key=lambda x: [int(p) for p in x.replace('TS-','').split('.')])
          print(goldeye[-1])
          ")

          LATEST_VERSION="${LATEST_TAG#TS-}"
          CURRENT_VERSION=$(cat version)

          echo "Latest TrueNAS tag: ${LATEST_TAG} (version: ${LATEST_VERSION})"
          echo "Current tracked version: ${CURRENT_VERSION}"

          if [ -n "$LATEST_VERSION" ] && [ "$LATEST_VERSION" != "$CURRENT_VERSION" ]; then
            echo "New release detected!"
            echo "new_release=true" >> "$GITHUB_OUTPUT"
            echo "new_version=${LATEST_VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "No new release"
            echo "new_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Read NVIDIA driver version
        if: steps.check_release.outputs.new_release == 'true'
        id: nvidia
        run: |
          echo "nvidia_version=$(cat .nvidia-driver-version | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Read train name
        if: steps.check_release.outputs.new_release == 'true'
        id: train
        run: |
          echo "train=$(cat train | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Update tracked version
        if: steps.check_release.outputs.new_release == 'true'
        run: |
          echo -n "${{ steps.check_release.outputs.new_version }}" > version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version
          git commit -m "Update tracked TrueNAS version to ${{ steps.check_release.outputs.new_version }}"
          git push

      - name: Trigger build for new TrueNAS release
        if: steps.check_release.outputs.new_release == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build.yml',
              ref: 'main',
              inputs: {
                truenas_version: '${{ steps.check_release.outputs.new_version }}',
                nvidia_driver_version: '${{ steps.nvidia.outputs.nvidia_version }}',
                train_name: '${{ steps.train.outputs.train }}'
              }
            });
            console.log('Triggered build for TrueNAS ${{ steps.check_release.outputs.new_version }}');
